schema: v1

entity:
  insight:
    id: ulid!
    project_id: ulid! fk:project
    category: enum[retry_rate,cost_optimization,model_selection,spec_quality,gate_effectiveness,workflow_optimization]!
    title: string:1-200!
    body: text!
    metric_data: jsonb = "{}"
    recommendation: text = ""
    priority: enum[low,medium,high,critical] = medium
    status: enum[pending,acknowledged,applied,dismissed] = pending

state:
  field: status
  transitions:
    acknowledge: pending -> acknowledged
    apply:       acknowledged -> applied
    dismiss:     pending,acknowledged -> dismissed

actions:
  acknowledge_insight:
    kind: transition
    transition: acknowledge
  apply_insight:
    kind: transition
    transition: apply
  dismiss_insight:
    kind: transition
    transition: dismiss

policies:
  can_acknowledge_insight:
    entity: insight
    data:
      insight:
        entity: insight
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.insight.status == $enum.InsightStatus.Pending
        else: insight must be pending

  can_apply_insight:
    entity: insight
    data:
      insight:
        entity: insight
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.insight.status == $enum.InsightStatus.Acknowledged
        else: insight must be acknowledged

  can_dismiss_insight:
    entity: insight
    data:
      insight:
        entity: insight
        where: id = $input.id
        fields: [status]
    rules:
      - any:
          - expr: $data.insight.status == $enum.InsightStatus.Pending
          - expr: $data.insight.status == $enum.InsightStatus.Acknowledged
        else: insight must be pending or acknowledged

filters:
  - project_id eq
  - category eq,in
  - status eq,in
  - priority in

events:
  - "InsightAcknowledged {insight_id, actor_id}"
  - "InsightApplied {insight_id, actor_id}"
