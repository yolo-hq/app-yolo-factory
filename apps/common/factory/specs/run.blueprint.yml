schema: v1

entity:
  run:
    id: ulid!
    task_id: ulid! fk:task
    agent_type: enum[claude-cli,claude-code,custom]!
    status: enum[running,completed,failed,cancelled,blocked] = running
    model: string!
    session_id: string
    session_name: string
    escalated_model: string
    cost_usd: float = 0
    tokens_in: int = 0
    tokens_out: int = 0
    duration_ms: int = 0
    num_turns: int = 0
    commit_hash: string
    branch_name: string
    files_changed: jsonb = "[]"
    result: text
    error: text
    started_at: datetime = now
    completed_at: datetime?

state:
  field: status
  transitions:
    block:   running -> blocked
    resume:  blocked -> running
    complete: running -> completed
    fail:    running,blocked -> failed
    cancel:  running,blocked -> cancelled

actions:
  block_run:
    kind: transition
    transition: block
    description: Block a running run waiting for a question

  resume_run:
    kind: transition
    transition: resume
    description: Resume a blocked run after question answered

  cancel_run:
    kind: transition
    transition: cancel
    description: Cancel a running or blocked run

  fail_run:
    kind: transition
    transition: fail
    description: Mark a run as failed

  complete_run:
    kind: custom
    input: complete_run
    description: Record run completion and advance state machine
    skip_policies: all
    emits: [RunCompleted, RunFailed]

policies:
  can_block_run:
    entity: run
    data:
      run:
        entity: run
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.run.status == $enum.RunStatus.Running
        else: run must be running

  can_resume_run:
    entity: run
    data:
      run:
        entity: run
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.run.status == $enum.RunStatus.Blocked
        else: run must be blocked

  can_cancel_run:
    entity: run
    data:
      run:
        entity: run
        where: id = $input.id
        fields: [status]
    rules:
      - any:
          - expr: $data.run.status == $enum.RunStatus.Running
          - expr: $data.run.status == $enum.RunStatus.Blocked
        else: run must be running or blocked

  can_fail_run:
    entity: run
    data:
      run:
        entity: run
        where: id = $input.id
        fields: [status]
    rules:
      - any:
          - expr: $data.run.status == $enum.RunStatus.Running
          - expr: $data.run.status == $enum.RunStatus.Blocked
        else: run must be running or blocked

inputs:
  complete_run:
    fields:
      status: string | required
      cost_usd: float?
      tokens_in: int?
      tokens_out: int?
      duration_ms: int?
      num_turns: int?
      error: text?
      commit_hash: string?
      files_changed: text?
      result: text?
      session_id: string?

filters:
  - status eq,in
  - task_id eq
  - model eq
  - cost_usd gt,lt
  - started_at gt,lt,between

events:
  - "RunStarted {run_id, task_id}"
  - "RunCompleted {run_id, cost_usd: float}"
  - "RunFailed {run_id, error: text}"
