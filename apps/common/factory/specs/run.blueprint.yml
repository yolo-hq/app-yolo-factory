schema: v1

entity:
  run:
    id: ulid!
    task_id: ulid! fk:task
    agent_type: enum[claude-cli,claude-code,custom]!
    status: enum[running,completed,failed,cancelled,blocked] = running
    model: string!
    session_id: string
    session_name: string
    escalated_model: string
    cost_usd: float = 0
    tokens_in: int = 0
    tokens_out: int = 0
    duration_ms: int = 0
    num_turns: int = 0
    commit_hash: string
    branch_name: string
    files_changed: jsonb = "[]"
    result: text
    error: text
    started_at: datetime = now
    completed_at: datetime?

state:
  field: status
  transitions:
    block:    running -> blocked
    unblock:  blocked -> running
    complete: running -> completed
    fail:     running -> failed
    cancel:   running,blocked -> cancelled

filters:
  - status eq,in
  - task_id eq
  - model eq
  - cost_usd gt,lt
  - started_at gt,lt,between

events:
  - "RunStarted {run_id, task_id}"
  - "RunCompleted {run_id, cost_usd: float}"
  - "RunFailed {run_id, error: text}"
