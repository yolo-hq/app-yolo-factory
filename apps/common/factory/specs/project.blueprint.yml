schema: v1

entity:
  project:
    id: ulid!
    name: string:1-200! @
    status: enum[active,paused,archived] = active
    repo_url: url!
    local_path: text = ""
    use_worktrees: bool = false
    default_branch: string:1-100 = "main"
    maintenance_branches: jsonb = "[]"
    default_model: string = "sonnet"
    escalation_model: string = "opus"
    escalation_after_retries: int = 2
    budget_per_task_usd: float = 2.0
    budget_per_prd_usd: float = 20.0
    budget_monthly_usd: float = 200.0
    budget_warning_at: float = 0.8
    spent_this_month_usd: float = 0
    max_retries: int = 3
    timeout_secs: int = 600
    auto_merge: bool = true
    auto_start: bool = false
    push_failed_branches: bool = false
    setup_commands: jsonb = "[]"
    test_commands: jsonb = "[]"

state:
  field: status
  transitions:
    pause:   active -> paused
    resume:  paused -> active
    archive: active,paused -> archived

actions:
  create_project:
    kind: create
    input: create_project
    skip_policies: all
  update_project:
    kind: update
    input: update_project
    skip_policies: all
  pause_project:
    kind: transition
    transition: pause
  resume_project:
    kind: transition
    transition: resume
  archive_project:
    kind: transition
    transition: archive

inputs:
  create_project:
    fields:
      name: string:1-200 | required
      repo_url: url | required
      local_path: text | required
      default_branch: string?
      default_model: string?
      budget_per_task_usd: float?
      budget_per_prd_usd: float?
      budget_monthly_usd: float?
      max_retries: int?
      timeout_secs: int?
      auto_merge: bool?
      setup_commands: text?
      test_commands: text?
  update_project:
    fields:
      name: string:1-200?
      default_branch: string?
      default_model: string?
      budget_per_task_usd: float?
      budget_per_prd_usd: float?
      budget_monthly_usd: float?
      max_retries: int?
      timeout_secs: int?
      auto_merge: bool?

policies:
  can_pause_project:
    entity: project
    data:
      project:
        entity: project
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.project.status == $enum.ProjectStatus.Active
        else: project must be active

  can_resume_project:
    entity: project
    data:
      project:
        entity: project
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.project.status == $enum.ProjectStatus.Paused
        else: project must be paused

  can_archive_project:
    entity: project
    data:
      project:
        entity: project
        where: id = $input.id
        fields: [status]
    rules:
      - any:
          - expr: $data.project.status == $enum.ProjectStatus.Active
          - expr: $data.project.status == $enum.ProjectStatus.Paused
        else: project must be active or paused

filters:
  - status eq
  - name eq,contains,starts_with

events:
  - "ProjectCreated {project_id, actor_id}"
  - "ProjectArchived {project_id, actor_id}"
