schema: v1

entity:
  suggestion:
    id: ulid!
    project_id: ulid! fk:project
    source: enum[review,sentinel,advisor,manual]!
    category: enum[optimization,refactoring,tech_debt,security,new_feature,pattern_extraction,bug_fix]!
    title: string:1-200!
    body: text!
    priority: enum[low,medium,high,critical] = medium
    status: enum[pending,approved,rejected,converted] = pending
    converted_task_id: ulid?

state:
  field: status
  transitions:
    approve: pending -> approved
    reject:  pending -> rejected
    convert: approved -> converted

actions:
  approve_suggestion:
    kind: transition
    transition: approve
    input: approve_suggestion
  reject_suggestion:
    kind: transition
    transition: reject
    input: reject_suggestion
  convert_suggestion:
    kind: transition
    transition: convert

inputs:
  approve_suggestion:
    fields:
      prd_id: ulid?
  reject_suggestion:
    fields:
      reason: string:1-500 | required

policies:
  can_approve_suggestion:
    entity: suggestion
    data:
      suggestion:
        entity: suggestion
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.suggestion.status == $enum.SuggestionStatus.Pending
        else: suggestion must be pending

  can_reject_suggestion:
    entity: suggestion
    data:
      suggestion:
        entity: suggestion
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.suggestion.status == $enum.SuggestionStatus.Pending
        else: suggestion must be pending

  can_convert_suggestion:
    entity: suggestion
    data:
      suggestion:
        entity: suggestion
        where: id = $input.id
        fields: [status]
    rules:
      - expr: $data.suggestion.status == $enum.SuggestionStatus.Approved
        else: suggestion must be approved

filters:
  - project_id eq
  - source eq,in
  - category eq,in
  - status eq,in
  - priority in
