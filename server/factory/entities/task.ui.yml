detail: sheet
views: [table, board, card]
columns:
  - field: title
    width: 2fr
  - field: status
  - field: priority
    width: 80px
  - field: type
    width: 100px
  - field: repo_id
    width: 150px
  - field: created_at
    width: 150px
board:
  group_by_field: status
card:
  title: title
  subtitle: status
  badges: [priority, type]
  footer: [repo_id, created_at]
fields:
  status:
    color_map:
      queued: "bg-yellow-100 text-yellow-800"
      running: "bg-blue-100 text-blue-800"
      done: "bg-green-100 text-green-800"
      failed: "bg-red-100 text-red-800"
      blocked: "bg-gray-100 text-gray-800"
      cancelled: "bg-gray-100 text-gray-500"
  priority:
    color_map:
      1: "bg-red-100 text-red-800"
      2: "bg-orange-100 text-orange-800"
      3: "bg-yellow-100 text-yellow-800"
      4: "bg-green-100 text-green-800"
      5: "bg-gray-100 text-gray-800"
create:
  tabs:
    - label: Details
      rows:
        - fields: [title, repo_id]
        - fields: [body]
        - fields: [type, priority]
        - fields: [model, max_retries, timeout_secs]
actions:
  cancel: { placement: [row], form: confirm }
  execute: { placement: [row] }
  delete: { placement: [row, bulk], form: confirm }
