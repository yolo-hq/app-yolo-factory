detail: sheet
views: [table]
columns:
  - field: task_id
    width: 200px
  - field: status
  - field: agent
    width: 100px
  - field: model
    width: 100px
  - field: cost
    width: 80px
  - field: duration
    width: 80px
  - field: started_at
    width: 150px
fields:
  status:
    color_map:
      running: "bg-blue-100 text-blue-800"
      success: "bg-green-100 text-green-800"
      failed: "bg-red-100 text-red-800"
actions:
  complete: { placement: [row], form: sheet }
