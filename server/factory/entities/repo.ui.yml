detail: sheet
views: [table, card]
table:
  columns:
    - field: name
      width: 2fr
    - field: url
      width: 2fr
    - field: target_branch
      width: 120px
    - field: active
      width: 80px
card:
  title: name
  subtitle: url
  badges: [active]
create:
  tabs:
    - label: Repository
      rows:
        - fields: [name, url]
        - fields: [local_path]
        - fields: [target_branch, default_model]
        - fields: [feedback_loops]
