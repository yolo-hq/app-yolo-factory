name: "yolo-factory"
version: "0.1.0"

database:
  primary:
    url: "${DATABASE_URL:sqlite://factory.db}"
    pool:
      max_open: 20
      max_idle: 10
      max_lifetime: "5m"

apps:
  api:
    type: server
    name: YOLO Factory API
    listeners:
      - protocol: http
        addr: ":9000"
        middleware:
          - cors
          - logging
          - recovery
      - protocol: mcp
        transport: sse
        addr: ":3001"
    cors:
      origins: ["http://localhost:3000"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: ["*"]
    domains:
      factory:
        entities:
          Repo: "*"
          Task: "*"
          Run:
            actions: [create]
            queries: [list]
          Question: "*"

  worker:
    type: worker
    name: YOLO Factory Worker
    concurrency: 5
    queues:
      - critical
      - default
    schedule:
      check-timeouts: "*/5 * * * *"
    health:
      addr: ":9001"
    shutdown:
      drain: 60s
    domains:
      factory: "*"

  cli:
    type: cli
    name: YOLO Factory CLI
    domains:
      factory: "*"
