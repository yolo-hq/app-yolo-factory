name: "yolo-factory"
version: "0.2.0"

database:
  primary:
    url: "${DATABASE_URL:postgresql://postgres@localhost:5432/yolo_factory?sslmode=disable}"
    pool:
      max_open: 20
      max_idle: 10
      max_lifetime: "5m"

redis:
  url: "${REDIS_URL:localhost:6379}"

agent_profiles:
  default:
    model: sonnet
    timeout_secs: 600
    max_retries: 3
  escalated:
    model: opus
    timeout_secs: 900
    max_retries: 1

backup:
  enabled: false
  schedule: "0 2 * * *"
  retention_days: 30

sentinel:
  enabled: false

advisor:
  enabled: false

apps:
  api:
    type: server
    name: YOLO Factory API
    listeners:
      - protocol: http
        addr: ":9000"
        middleware:
          - cors
          - logging
          - recovery
      # MCP not yet supported by framework — enable when available
      # - protocol: mcp
      #   transport: sse
      #   addr: ":3001"
    cors:
      origins: ["http://localhost:3000"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: ["*"]
    domains:
      factory:
        entities:
          Project: "*"
          PRD: "*"
          Task: "*"
          Run:
            actions: [create]
            queries: [list, get]
          Step:
            queries: [list, get]
          Review:
            queries: [list, get]
          Question: "*"
          Suggestion: "*"
          Insight: "*"
          LintResult:
            queries: [list, get]

  worker:
    type: worker
    name: YOLO Factory Worker
    concurrency: 5
    queues:
      - critical
      - default
      - execution
    schedule:
      check-timeouts: "*/5 * * * *"
      reset-monthly-budgets: "0 0 1 * *"
    health:
      addr: ":9001"
    shutdown:
      drain: 60s
    domains:
      factory: "*"

  cli:
    type: cli
    name: YOLO Factory CLI
    domains:
      factory: "*"

clients:
  admin:
    port: 3000
