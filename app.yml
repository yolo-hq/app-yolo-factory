name: "yolo-factory"
version: "0.1.0"

database:
  primary:
    url: "${DATABASE_URL:sqlite://factory.db}"
    pool:
      max_open: 20
      max_idle: 10
      max_lifetime: "5m"

apps:
  api:
    id: api
    name: YOLO Factory API
    servers:
      - type: http
        addr: ":9000"
        middleware:
          - cors
          - logging
          - recovery
    cors:
      origins: ["http://localhost:3000"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: ["*"]
    domains:
      factory:
        entities:
          Repo: "*"
          Task: "*"
