entity:
  icon: play
  color: "#3b82f6"
  label: Run
  plural: Runs
  description: Individual execution attempts of tasks

picker:
  display: session_name
  subtitle: status
  search_fields: [model, agent_type]
  mode: search

views:
  default: table
  options: [table]

create:
  mode: disabled

search:
  enabled: true
  fields: [model, agent_type]
  placeholder: "Search runs..."

table:
  density: comfortable
  page_size: 50
  resizable: true
  default_sort:
    field: started_at
    dir: desc
  columns:
    - field: agent_type
      width: 120px
    - field: model
      width: 100px
    - field: status
      sortable: true
    - field: cost_usd
      width: 80px
      sortable: true
    - field: duration_ms
      width: 100px
      sortable: true
    - field: num_turns
      width: 80px
    - field: started_at
      width: 150px
      sortable: true
  styles:
    - when: { field: status, eq: running }
      class: text-blue-500
    - when: { field: status, eq: completed }
      class: text-green-500
    - when: { field: status, eq: failed }
      class: text-red-500

filters:
  - field: status
    pinned: true
    show_in: [toolbar]
  - field: model
    show_in: [toolbar]
  - field: task_id
    show_in: [toolbar]

detail:
  size: lg
  layout: sections
  sections:
    - label: Overview
      columns: 2
      fields: [task_id, agent_type, model, status, session_id]
    - label: Metrics
      columns: 2
      fields: [cost_usd, tokens_in, tokens_out, duration_ms, num_turns]
    - label: Result
      fields: [commit_hash, branch_name, files_changed, result, error]

empty:
  title: No runs
  description: Runs are created when tasks execute.
  icon: play
