entity:
  icon: play-circle
  color: "#3b82f6"
  label: Run
  plural: Runs
  description: Individual execution runs of tasks by AI agents

picker:
  display: task_id
  subtitle: status
  search_fields: [agent, model]
  mode: search

groupable: [status, agent, model]

views:
  default: table
  options: [table, list, card]

create:
  mode: modal
  width: md
  fields: [task_id, repo_id, agent, model]
  required: [task_id]

search:
  enabled: true
  fields: [agent, model, error]
  placeholder: "Search runs..."

table:
  density: comfortable
  page_size: 50
  resizable: true
  default_sort:
    field: started_at
    dir: desc
  columns:
    - field: task_id
      width: 200px
      pinned: left
    - field: status
      sortable: true
    - field: agent
      width: 120px
    - field: model
      width: 100px
    - field: cost
      width: 80px
      sortable: true
    - field: duration
      width: 100px
      sortable: true
    - field: started_at
      width: 150px
      sortable: true
  styles:
    - when: { field: status, eq: failed }
      class: text-red-500
    - when: { field: status, eq: completed }
      class: text-green-500
    - when: { field: status, eq: running }
      class: text-blue-500

list:
  group_by: status
  title_field: task_id
  subtitle: "{{agent}} | {{model}}"
  meta: [started_at, cost, duration]

card:
  title: task_id
  subtitle: "{{agent}} | {{model}}"
  badges: [status]
  meta: [started_at, cost, duration]
  fields: [commit_hash, error]

filters:
  - field: status
    pinned: true
    show_in: [toolbar]
  - field: agent
    show_in: [toolbar]
  - field: model
    show_in: [advanced]
  - field: started_at
    show_in: [advanced]
    type: date_range

actions:
  - name: retry
    label: Retry
    icon: refresh-cw
    style: default
    show_in: [row, detail, context]
    pinned: true
  - name: cancel
    label: Cancel
    icon: x-circle
    style: destructive
    confirm: "Cancel this run?"
    show_in: [row, detail, context]

form:
  layout: rows
  rows:
    - fields: [task_id, repo_id]
    - fields: [agent, model]

detail:
  size: lg
  layout: sections
  sections:
    - label: Overview
      columns: 2
      fields: [task_id, repo_id, status, agent, model]
    - label: Results
      fields: [cost, duration, commit_hash, log_url, error]
    - label: Timing
      fields: [started_at, completed_at]
  sidebar:
    fields: [status, agent, model, started_at, completed_at]

fields:
  task_id:
    label: Task
  agent:
    label: Agent
  cost:
    readonly: true
    label: Cost
  duration:
    readonly: true
    label: Duration
  error:
    label: Error Output

empty:
  title: No runs yet
  description: Runs are created when tasks are executed.
  icon: play-circle
  cta: Execute Task

styles:
  - when: { field: status, eq: failed }
    class: border-l-2 border-l-red-500
