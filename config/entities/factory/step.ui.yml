entity:
  icon: layers
  color: "#14b8a6"
  label: Step
  plural: Steps
  description: Individual phases within a run execution

views:
  default: table
  options: [table]

create:
  mode: disabled

table:
  density: comfortable
  page_size: 50
  default_sort:
    field: started_at
    dir: asc
  columns:
    - field: phase
      width: 100px
      sortable: true
    - field: skill
      width: 100px
    - field: status
      sortable: true
    - field: model
      width: 100px
    - field: cost_usd
      width: 80px
      sortable: true
    - field: duration_ms
      width: 100px
      sortable: true
  styles:
    - when: { field: status, eq: running }
      class: text-blue-500
    - when: { field: status, eq: completed }
      class: text-green-500
    - when: { field: status, eq: failed }
      class: text-red-500

filters:
  - field: status
    pinned: true
    show_in: [toolbar]
  - field: run_id
    show_in: [toolbar]

detail:
  size: md
  layout: sections
  sections:
    - label: Overview
      columns: 2
      fields: [run_id, phase, skill, status, model, session_id]
    - label: Metrics
      columns: 2
      fields: [cost_usd, tokens_in, tokens_out, duration_ms]
    - label: Summary
      fields: [input_summary, output_summary]

empty:
  title: No steps
  description: Steps are created during run execution.
  icon: layers
