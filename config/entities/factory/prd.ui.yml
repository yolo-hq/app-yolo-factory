entity:
  icon: file-text
  color: "#8b5cf6"
  label: PRD
  plural: PRDs
  description: Product requirements documents for planning and execution

picker:
  display: title
  subtitle: status
  search_fields: [title, body]
  mode: search

views:
  default: table
  options: [table, list]

create:
  mode: modal
  width: lg
  fields: [title, project_id, body, acceptance_criteria]
  required: [title, project_id, body]

search:
  enabled: true
  fields: [title, body]
  placeholder: "Search PRDs..."

table:
  density: comfortable
  page_size: 50
  default_sort:
    field: created_at
    dir: desc
  columns:
    - field: title
      width: 2fr
      sortable: true
      pinned: left
    - field: status
      sortable: true
    - field: source
      width: 100px
    - field: completed_tasks
      width: 80px
      label: Done
    - field: total_tasks
      width: 80px
      label: Total
    - field: total_cost_usd
      width: 100px
      sortable: true
  styles:
    - when: { field: status, eq: draft }
      class: text-zinc-500
    - when: { field: status, eq: approved }
      class: text-blue-500
    - when: { field: status, eq: in_progress }
      class: text-yellow-500
    - when: { field: status, eq: completed }
      class: text-green-500
    - when: { field: status, eq: failed }
      class: text-red-500

list:
  group_by: status
  title_field: title
  subtitle: "{{source}}"
  meta: [total_cost_usd, completed_tasks, total_tasks]

filters:
  - field: status
    pinned: true
    show_in: [toolbar]
  - field: source
    show_in: [toolbar]
  - field: project_id
    show_in: [toolbar]

actions:
  - name: approve
    label: Approve
    icon: check
    style: success
    show_in: [row, detail, context]
  - name: execute
    label: Execute
    icon: play
    style: default
    show_in: [row, detail, context]

detail:
  size: lg
  layout: sections
  sections:
    - label: Overview
      columns: 2
      fields: [title, status, source, created_by, project_id]
    - label: Content
      fields: [body, acceptance_criteria, design_decisions]
    - label: Progress
      columns: 2
      fields: [total_tasks, completed_tasks, failed_tasks, total_cost_usd]

empty:
  title: No PRDs
  description: Submit a PRD to start planning tasks.
  icon: file-text
  cta: Submit PRD
