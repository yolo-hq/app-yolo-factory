entity:
  icon: brain
  color: "#8b5cf6"
  label: Insight
  plural: Insights
  description: AI-generated insights about project patterns and optimization opportunities

picker:
  display: title
  subtitle: category
  search_fields: [title, body]
  mode: search

views:
  default: table
  options: [table]

create:
  mode: disabled

search:
  enabled: true
  fields: [title, body, recommendation]
  placeholder: "Search insights..."

table:
  density: comfortable
  page_size: 50
  default_sort:
    field: created_at
    dir: desc
  columns:
    - field: title
      width: 2fr
      sortable: true
      pinned: left
    - field: category
      width: 120px
    - field: priority
      width: 80px
      sortable: true
    - field: status
      sortable: true
    - field: recommendation
      width: 2fr
  styles:
    - when: { field: status, eq: pending }
      class: text-yellow-500
    - when: { field: status, eq: acknowledged }
      class: text-blue-500
    - when: { field: status, eq: applied }
      class: text-green-500
    - when: { field: status, eq: dismissed }
      class: text-gray-400
    - when: { field: priority, eq: critical }
      class: font-bold text-red-500
    - when: { field: priority, eq: high }
      class: font-semibold

filters:
  - field: status
    pinned: true
    show_in: [toolbar]
  - field: category
    pinned: true
    show_in: [toolbar]
  - field: priority
    show_in: [toolbar]
  - field: project_id
    show_in: [toolbar]

actions:
  - name: acknowledge
    label: Acknowledge
    icon: eye
    style: primary
    show_in: [row, detail, context]
  - name: apply
    label: Apply
    icon: check
    style: success
    show_in: [row, detail, context]
  - name: dismiss
    label: Dismiss
    icon: x
    style: destructive
    show_in: [row, detail, context]

detail:
  size: lg
  layout: sections
  sections:
    - label: Overview
      columns: 2
      fields: [title, category, priority, status, project_id]
    - label: Content
      fields: [body, recommendation, metric_data]

empty:
  title: No insights
  description: Insights are generated by analyzing project patterns and metrics.
  icon: brain
