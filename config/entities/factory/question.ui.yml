entity:
  icon: help-circle
  color: "#f59e0b"
  label: Question
  plural: Questions
  description: Questions raised by AI agents during task execution

picker:
  display: body
  subtitle: status
  search_fields: [body, context]
  mode: search

groupable: [status]

views:
  default: table
  options: [table, list]

create:
  mode: modal
  width: md
  fields: [body, context, task_id]
  required: [body]

search:
  enabled: true
  fields: [body, context, tried]
  placeholder: "Search questions..."

table:
  density: comfortable
  page_size: 50
  resizable: true
  default_sort:
    field: created_at
    dir: desc
  columns:
    - field: body
      width: 3fr
      pinned: left
    - field: status
      sortable: true
    - field: context
      width: 2fr
    - field: task_id
      width: 150px
    - field: created_at
      width: 150px
      sortable: true
  styles:
    - when: { field: status, eq: open }
      class: text-yellow-500
    - when: { field: status, eq: resolved }
      class: text-green-500
    - when: { field: status, eq: dismissed }
      class: text-zinc-500

list:
  group_by: status
  title_field: body
  subtitle: "{{context}}"
  meta: [task_id, created_at]

card:
  title: body
  subtitle: "{{context}}"
  badges: [status]
  meta: [task_id, created_at]

filters:
  - field: status
    pinned: true
    show_in: [toolbar]
  - field: task_id
    show_in: [toolbar]
  - field: created_at
    show_in: [advanced]
    type: date_range

actions:
  - name: resolve
    label: Resolve
    icon: check
    style: success
    show_in: [row, detail, bulk, context]
    pinned: true
    shortcut: "mod+r"
  - name: dismiss
    label: Dismiss
    icon: x
    style: destructive
    show_in: [row, detail, context]
    undo: true

form:
  layout: rows
  rows:
    - fields: [body]
    - fields: [context]
    - fields: [task_id, run_id]
    - fields: [resolution]

detail:
  size: lg
  layout: sections
  sections:
    - label: Question
      columns: 2
      fields: [body, context, tried]
    - label: Resolution
      fields: [status, resolution]
    - label: Source
      fields: [task_id, run_id, repo_id]
  sidebar:
    fields: [status, task_id, created_at]

fields:
  body:
    label: Question
    placeholder: "Enter the question..."
  context:
    label: Context
  resolution:
    label: Resolution
  task_id:
    label: Task
  run_id:
    label: Run

empty:
  title: No questions
  description: Questions appear when AI agents need human input during execution.
  icon: help-circle
  cta: Ask Question

styles:
  - when: { field: status, eq: open }
    class: border-l-2 border-l-yellow-500
