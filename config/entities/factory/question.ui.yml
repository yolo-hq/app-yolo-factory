entity:
  icon: help-circle
  color: "#f59e0b"
  label: Question
  plural: Questions
  description: Questions raised by AI agents needing human input

picker:
  display: body
  subtitle: status
  search_fields: [body, context]
  mode: search

views:
  default: table
  options: [table]

create:
  mode: disabled

search:
  enabled: true
  fields: [body, context]
  placeholder: "Search questions..."

table:
  density: comfortable
  page_size: 50
  resizable: true
  default_sort:
    field: created_at
    dir: desc
  columns:
    - field: body
      width: 3fr
      pinned: left
    - field: confidence
      width: 100px
    - field: status
      sortable: true
    - field: answered_by
      width: 100px
  styles:
    - when: { field: status, eq: open }
      class: text-yellow-500
    - when: { field: status, eq: answered }
      class: text-green-500
    - when: { field: status, eq: dismissed }
      class: text-zinc-500
    - when: { field: confidence, eq: low }
      class: font-bold
    - when: { field: confidence, eq: high }
      class: opacity-70

filters:
  - field: status
    pinned: true
    show_in: [toolbar]
  - field: confidence
    show_in: [toolbar]
  - field: task_id
    show_in: [toolbar]

actions:
  - name: answer
    label: Answer
    icon: message-circle
    style: default
    show_in: [row, detail, context]
    pinned: true

detail:
  size: lg
  layout: sections
  sections:
    - label: Question
      fields: [body, context, confidence]
    - label: Answer
      fields: [status, answer, answered_by, answered_at]
    - label: Source
      columns: 2
      fields: [task_id, run_id]

empty:
  title: No questions
  description: Questions appear when AI agents need human input.
  icon: help-circle
