entity:
  icon: list-checks
  color: "#6366f1"
  label: Task
  plural: Tasks
  description: Individual implementation tasks executed by AI agents

picker:
  display: title
  subtitle: status
  search_fields: [title, spec]
  mode: search

groupable: [status, model]

views:
  default: table
  options: [table, board]

create:
  mode: disabled

search:
  enabled: true
  fields: [title, spec]
  placeholder: "Search tasks..."

table:
  density: comfortable
  page_size: 50
  resizable: true
  default_sort:
    field: sequence
    dir: asc
  columns:
    - field: sequence
      width: 60px
      sortable: true
    - field: title
      width: 2fr
      sortable: true
      pinned: left
    - field: status
      sortable: true
    - field: branch
      width: 150px
    - field: cost_usd
      width: 80px
      sortable: true
    - field: run_count
      width: 60px
  styles:
    - when: { field: status, eq: queued }
      class: text-zinc-500
    - when: { field: status, eq: running }
      class: text-blue-500
    - when: { field: status, eq: completed }
      class: text-green-500
    - when: { field: status, eq: failed }
      class: text-red-500
    - when: { field: status, eq: cancelled }
      class: text-yellow-500/60
    - when: { field: status, eq: blocked }
      class: text-orange-500

board:
  group_by: status
  column_width: 280
  card_create: false
  drag: false

filters:
  - field: status
    pinned: true
    show_in: [toolbar]
  - field: prd_id
    show_in: [toolbar]
  - field: project_id
    show_in: [toolbar]

actions:
  - name: cancel
    label: Cancel
    icon: x-circle
    style: destructive
    confirm: "Cancel this task?"
    show_in: [row, detail, context]
  - name: retry
    label: Retry
    icon: refresh-cw
    style: default
    show_in: [row, detail, context]

detail:
  size: lg
  layout: sections
  sections:
    - label: Overview
      columns: 2
      fields: [title, status, sequence, branch, model, prd_id, project_id]
    - label: Spec
      fields: [spec, acceptance_criteria]
    - label: Execution
      columns: 2
      fields: [run_count, max_retries, cost_usd, commit_hash, summary]

empty:
  title: No tasks
  description: Tasks are created when a PRD is planned.
  icon: list-checks

styles:
  - when: { field: status, eq: failed }
    class: border-l-2 border-l-red-500
