views:
  default: table

columns:
  - field: name
    title: Name
    width: 2fr
    sortable: true
  - field: url
    title: URL
    width: 2fr
  - field: target_branch
    title: Branch
    width: 120px
  - field: active
    title: Active
    width: 80px

form:
  rows:
    - fields: [name]
    - fields: [url]
    - fields: [local_path]
    - fields: [target_branch, default_model]
    - fields: [feedback_loops, active]
