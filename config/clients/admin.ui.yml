layout:
  mode: sidebar
  sidebar:
    width: 240
    collapsible: true
    persist_state: true
    keyboard_toggle: true

branding:
  app_name: "YOLO Factory"

theme:
  default: light
  accent: purple

navigation:
  favorites: true
  search: true
  items:
    - group: Factory
      icon: factory
      color: "#7f77f1"
      order: 1
      items:
        - entity: Task
          icon: check-square
          label: Tasks
        - entity: Run
          icon: play
          label: Runs
        - entity: Repo
          icon: git-branch
          label: Repos
        - entity: Question
          icon: help-circle
          label: Questions
    - group: System
      icon: settings
      order: 99
      position: bottom
      items:
        - label: Settings
          icon: settings
          href: /settings
