type: stack
props:
  gap: lg
children:
  # Two-column: PRDs + Recent Tasks
  - type: split
    props:
      sizes: { _: [1], md: [60, 40] }
      gap: lg
    children:
      - type: table
        label: Active PRDs
        source: factory.prd
        props:
          columns: [title, status, completed_tasks, total_tasks, total_cost_usd]
          limit: 5
          compact: true
      - type: table
        label: Recent Tasks
        source: factory.task
        props:
          columns: [title, status, branch, cost_usd]
          sort: -created_at
          limit: 5
          compact: true

  # Two-column: Runs + Questions
  - type: split
    props:
      sizes: { _: [1], md: [50, 50] }
      gap: lg
    children:
      - type: table
        label: Recent Runs
        source: factory.run
        props:
          columns: [agent_type, model, status, cost_usd, started_at]
          limit: 5
          compact: true
      - type: table
        label: Open Questions
        source: factory.question
        props:
          columns: [body, confidence, status]
          limit: 5
          compact: true
